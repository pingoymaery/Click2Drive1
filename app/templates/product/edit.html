<body>
  <h1>Edit Product</h1>

  <!-- Flash messages -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <p><strong>{{ message }}</strong></p>
      {% endfor %}
    {% endif %}
  {% endwith %}

  <!-- Edit form – pre-filled with existing data -->
  <form method="POST" action="{{ url_for('product.edit_product', product_id=product.id) }}">
    <label>Name:</label><br>
    <input type="text" name="name" value="{{ product.name }}" required><br><br>

    <label>Type:</label><br>
    <input type="text" name="type" value="{{ product.type }}" required><br><br>

    <label>Price:</label><br>
    <input type="number" step="0.01" name="price" value="{{ product.price }}" required><br><br>

    <button type="submit">Save Changes</button>
    <a href="{{ url_for('product.list_products') }}">Cancel</a>
  </form>
</body>
