{% extends 'carbase.html' %}

{% block content %}
<div class="main-content detail-view">
  
  <div class="page-title-section">
    <span class="product-badge">{{ product.type }}</span>
    <h1>{{ product.name }}</h1>
    <p>Premium Vehicle Specifications</p>
  </div>

  <div class="car-detail-card">
    <div class="detail-grid">
      
      <div class="detail-group">
        <label>Current Valuation</label>
        <p class="price-value">₱{{ "{:,}".format(product.price) }}</p>
      </div>
      
      <div class="detail-group">
        <label>Classification</label>
        <p class="type-value">{{ product.type }}</p>
      </div>
      
    </div>
  </div>

  <div class="detail-actions">
    <a href="{{url_for('product.cars')}}" class="btn-return">
      <i class="fa-solid fa-arrow-left-long"></i> Return to Product Page
    </a>
  </div>

</div>
{% endblock %}
